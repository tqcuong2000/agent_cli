# -- Internal Model Selection -----------------------------------------
[internal_models]
routing_model = "gemini-2.5-flash-lite"
summarization_model = "gemini-2.5-flash-lite"

# -- Context Windows ---------------------------------------------------
[context_windows]
"gpt-4o" = 128_000
"o1" = 200_000
"o3" = 200_000
"gemini-1.5-pro" = 2_000_000

default_context_window = 128_000

[[context_window_prefixes]]
prefix = "gpt-4o"
tokens = 128_000

[[context_window_prefixes]]
prefix = "gpt-4.1"
tokens = 128_000

[[context_window_prefixes]]
prefix = "gpt-5"
tokens = 128_000

[[context_window_prefixes]]
prefix = "o1"
tokens = 200_000

[[context_window_prefixes]]
prefix = "o3"
tokens = 200_000

[[context_window_prefixes]]
prefix = "o4"
tokens = 200_000

[[context_window_prefixes]]
prefix = "claude"
tokens = 200_000

[[context_window_prefixes]]
prefix = "gemini-1.5-pro"
tokens = 2_000_000

[[context_window_prefixes]]
prefix = "gemini"
tokens = 1_000_000

# -- Pricing (USD per 1M tokens) --------------------------------------
[pricing]
"gpt-4.5" = { input = 75.00, output = 150.00 }
"gpt-4.5-mini" = { input = 0.40, output = 1.60 }
"gpt-4o" = { input = 2.50, output = 10.00 }
"gpt-4o-mini" = { input = 0.15, output = 0.60 }
"gpt-5" = { input = 2.00, output = 8.00 }
"gpt-5-mini" = { input = 0.30, output = 1.20 }
"o3" = { input = 2.00, output = 8.00 }
"o3-mini" = { input = 1.10, output = 4.40 }
"o3-pro" = { input = 20.00, output = 80.00 }
"o4-mini" = { input = 1.10, output = 4.40 }
"codex-mini" = { input = 1.50, output = 6.00 }
"claude-sonnet-4.6" = { input = 3.00, output = 15.00 }
"claude-opus-4.6" = { input = 15.00, output = 75.00 }
"claude-haiku-4.5" = { input = 0.80, output = 4.00 }
"claude-sonnet-4" = { input = 3.00, output = 15.00 }
"claude-opus-4" = { input = 15.00, output = 75.00 }
"claude-3-5-sonnet" = { input = 3.00, output = 15.00 }
"claude-3-opus" = { input = 15.00, output = 75.00 }
"gemini-2.5-pro" = { input = 1.25, output = 10.00 }
"gemini-2.5-flash" = { input = 0.15, output = 0.60 }
"gemini-2.0-flash" = { input = 0.10, output = 0.40 }
"llama-3-8b" = { input = 0.0, output = 0.0 }
"codestral" = { input = 0.0, output = 0.0 }

default_pricing = { input = 0.0, output = 0.0 }

# -- Tokenizer Encoding Selection -------------------------------------
[tokenizer]
o200k_prefixes = ["gpt-4o", "gpt-4.1", "gpt-5", "o1", "o3", "o4"]
default_encoding = "cl100k_base"

# -- Built-in Providers ------------------------------------------------
[providers.openai]
adapter_type = "openai"
models = ["gpt-4o", "gpt-4o-mini", "o1", "o1-mini"]
default_model = "gpt-4o"

[providers.anthropic]
adapter_type = "anthropic"
models = [
    "claude-3-5-sonnet-20241022",
    "claude-3-5-haiku-20241022",
    "claude-3-opus-20240229",
]
default_model = "claude-3-5-sonnet-20241022"

[providers.google]
adapter_type = "google"
models = [
    "gemini-2.5-flash",
    "gemini-2.5-flash-lite",
    "gemini-2.0-flash",
    "gemini-2.0-pro",
]
default_model = "gemini-2.5-flash-lite"

[providers.huggingface]
adapter_type = "openai_compatible"
base_url = "https://router.huggingface.co/v1"
models = [
    "mistralai/Mistral-7B-Instruct-v0.3",
    "meta-llama/Llama-3.1-8B-Instruct",
    "microsoft/Phi-3-mini-4k-instruct",
]
default_model = "mistralai/Mistral-7B-Instruct-v0.3"

[providers.openrouter]
adapter_type = "openai_compatible"
base_url = "https://openrouter.ai/api/v1"
models = [
    "anthropic/claude-3.5-sonnet",
    "deepseek/deepseek-chat",
    "google/gemini-2.5-flash",
    "meta-llama/llama-3.1-8b-instruct",
]
default_model = "anthropic/claude-3.5-sonnet"
